##
# Nginx reverse proxy config for ai-infra-monitor
#
# Usage:
#   sudo cp nginx.conf /etc/nginx/sites-available/ai-infra-monitor
#   sudo ln -s /etc/nginx/sites-available/ai-infra-monitor /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Replace YOUR_DOMAIN with your actual domain or subdomain.
##

server {
    listen 80;
    server_name YOUR_DOMAIN;

    # If you're behind Cloudflare (proxied), this is fine as-is.
    # Cloudflare handles SSL termination; traffic from CF to your server is HTTP.
    # Set Cloudflare SSL/TLS mode to "Flexible" or install a cert for "Full".

    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Block direct IP access (Cloudflare only)
    # Uncomment the block below if you want to restrict to Cloudflare IPs only.
    # You'll need to update CF IP ranges periodically or use a dynamic solution.
    #
    # allow 103.21.244.0/22;
    # allow 103.22.200.0/22;
    # allow 103.31.4.0/22;
    # allow 104.16.0.0/13;
    # allow 104.24.0.0/14;
    # allow 108.162.192.0/18;
    # allow 131.0.72.0/22;
    # allow 141.101.64.0/18;
    # allow 162.158.0.0/15;
    # allow 172.64.0.0/13;
    # allow 173.245.48.0/20;
    # allow 188.114.96.0/20;
    # allow 190.93.240.0/20;
    # allow 197.234.240.0/22;
    # allow 198.41.128.0/17;
    # deny all;
}
